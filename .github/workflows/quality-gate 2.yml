name: quality-gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_cost:
        description: "Run cost estimation (Infracost)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pull-requests: read

jobs:
  terraform-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Dependency scanning
      - name: Dependency review (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v4

      # Secret scanning
      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # Terraform format check
      - name: Terraform fmt
        run: terraform fmt -check -recursive

      # -------------------------
      # Terraform example run
      # -------------------------
      - name: Terraform init
        working-directory: examples/storage-basic
        run: terraform init -input=false -upgrade

      - name: Terraform validate
        working-directory: examples/storage-basic
        run: terraform validate

      - name: Terraform plan
        working-directory: examples/storage-basic
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        working-directory: examples/storage-basic
        run: terraform show -json tfplan.binary > tfplan.json

      # -------------------------
      # Install Checkov
      # -------------------------
      - name: Install Checkov
        run: pip3 install -q checkov

      - name: Run Checkov
        working-directory: examples/storage-basic
        run: |
          checkov -d . \
            --framework terraform \
            -o json > checkov-results.json || true

      - name: Upload Checkov JSON
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: examples/storage-basic/checkov-results.json

      # -------------------------
      # Security gate
      # -------------------------
      - name: Enforce Security Policy
        working-directory: examples/storage-basic
        run: |
          python3 - <<'PY'
          import json, sys

          with open("checkov-results.json","r",encoding="utf-8") as f:
              data = json.load(f)

          failed = data.get("results", {}).get("failed_checks", []) or []

          if len(failed) > 0:
              print(f"❌ Security Gate failed: {len(failed)} findings detected.")
              sys.exit(1)

          print("✅ Security Gate passed.")
          PY
